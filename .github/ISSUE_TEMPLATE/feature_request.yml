name: Feature request
description: Propose a new feature or improvement
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What workflow or user need does this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior, command, or interface you want.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - TOC planning
        - Brief generation
        - Chapter pipeline
        - Validation / QA
        - LLM gateway / providers
        - Compiler
        - Documentation
        - Other
  - type: textarea
    id: constraints
    attributes:
      label: Constraints or risks
      description: Include provider concerns, safety gates, prompt contracts, or compatibility notes.
