name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e .

      - name: Compile Python sources
        run: python -m compileall src

      - name: CLI smoke tests
        run: |
          vf --help
          vyasaforge --help
          python -m src.cli --help
          python -m src.cli doctor
          python -m src.cli list-providers
          python -m src.cli agent-status

      - name: Ruff placeholder
        run: |
          if command -v ruff >/dev/null 2>&1; then
            ruff check .
          else
            echo "ruff is not configured yet; skipping"
          fi

      - name: Pytest placeholder
        run: |
          if [ -d tests ]; then
            python -m pytest
          else
            echo "pytest tests are not configured yet; skipping"
          fi

      - name: Mypy placeholder
        run: |
          if [ -f mypy.ini ] || grep -q "tool.mypy" pyproject.toml; then
            python -m mypy src
          else
            echo "mypy is not configured yet; skipping"
          fi

      - name: Bandit placeholder
        run: |
          if command -v bandit >/dev/null 2>&1; then
            bandit -r src
          else
            echo "bandit is not configured yet; skipping"
          fi
